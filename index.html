<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#111111">
  <link rel="manifest" href="manifest.json">
  <title>INL Retro Dumper Programmer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f13;
      color: #c8c8d4;
      padding: 2rem 1.5rem;
      line-height: 1.6;
    }

    /* ── Page container ─────────────────────────────────────── */
    .page-wrap {
      max-width: 900px;
      margin: 0 auto;
    }

    /* ── Header ─────────────────────────────────────────────── */
    .site-header {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 0.3rem;
      flex-wrap: wrap;
    }

    h1 {
      color: #eeeef5;
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: -0.025em;
    }

    h2 {
      color: #7878a0;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 0.9rem;
    }

    .subtitle {
      color: #50505e;
      font-size: 0.8rem;
      margin-bottom: 1.75rem;
    }

    /* ── Cards ─────────────────────────────────────────────── */
    .card {
      background: #17171f;
      border: 1px solid #2a2a3a;
      border-radius: 12px;
      padding: 1.3rem 1.5rem;
      margin-bottom: 1rem;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.35);
    }

    .row {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      flex-wrap: wrap;
    }

    label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #a0a0b8;
      font-size: 0.875rem;
      font-weight: 500;
    }

    select {
      background: #22222e;
      color: #dddde8;
      border: 1px solid #38384e;
      border-radius: 7px;
      padding: 0.38rem 0.65rem;
      font-family: inherit;
      font-size: 0.875rem;
      cursor: pointer;
    }
    select:focus { outline: 2px solid #2a7a46; outline-offset: 1px; }

    /* ── Buttons ────────────────────────────────────────────── */
    button {
      background: #1b6e38;
      color: #eeeef5;
      border: none;
      border-radius: 7px;
      padding: 0.55rem 1.3rem;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
      letter-spacing: 0.01em;
    }
    button:hover:not(:disabled) {
      background: #228945;
      box-shadow: 0 2px 10px rgba(34, 137, 69, 0.35);
    }
    button:disabled { background: #252530; color: #45455a; cursor: not-allowed; }
    button.secondary { background: #293476; }
    button.secondary:hover:not(:disabled) {
      background: #3343a8;
      box-shadow: 0 2px 10px rgba(51, 67, 168, 0.35);
    }

    /* ── Device status ──────────────────────────────────────── */
    #device-status {
      font-size: 0.82rem;
      font-weight: 500;
      padding: 0.28rem 0.8rem;
      border-radius: 20px;
      background: #20202c;
      color: #58587a;
    }
    #device-status.connected { background: #112517; color: #45c46e; }

    /* ── Tab bar ────────────────────────────────────────────── */
    .tab-bar {
      display: flex;
      gap: 0.2rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      background: #13131a;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      padding: 0.25rem;
    }

    .tab-bar button {
      background: transparent;
      color: #55556e;
      border: none;
      border-radius: 7px;
      padding: 0.48rem 1.05rem;
      font-size: 0.84rem;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
      flex: 1;
      text-align: center;
      box-shadow: none;
    }
    .tab-bar button:hover:not(.active):not(:disabled) {
      background: #1e1e2a;
      color: #9898b8;
      box-shadow: none;
    }
    .tab-bar button.active {
      background: #26263a;
      color: #dddde8;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
    }
    .tab-bar button:disabled {
      color: #35354a;
      background: transparent;
      cursor: default;
      box-shadow: none;
    }

    /* ── Tab panels ─────────────────────────────────────────── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Coming soon placeholder ────────────────────────────── */
    .coming-soon {
      padding: 2.5rem 1.5rem;
      text-align: center;
      color: #40404e;
      font-size: 0.9rem;
      border: 1px dashed #28283a;
      border-radius: 10px;
    }
    .coming-soon strong { display: block; font-size: 1rem; margin-bottom: 0.4rem; color: #50505e; }

    /* ── Progress ───────────────────────────────────────────── */
    #progress-card { display: none; }
    #phase-label { font-size: 0.85rem; color: #8888a8; margin-bottom: 0.6rem; }

    progress {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 8px;
      border-radius: 4px;
      overflow: hidden;
      border: none;
    }
    progress::-webkit-progress-bar   { background: #22222e; border-radius: 4px; }
    progress::-webkit-progress-value {
      background: linear-gradient(90deg, #1b6e38, #28a852);
      border-radius: 4px;
      transition: width 0.1s;
    }
    progress::-moz-progress-bar { background: #28a852; border-radius: 4px; }

    /* ── Log ────────────────────────────────────────────────── */
    #log {
      background: #0b0b0f;
      border: 1px solid #1e1e28;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      min-height: 120px;
      max-height: 300px;
      overflow-y: auto;
      font-family: ui-monospace, 'Cascadia Code', Consolas, monospace;
      font-size: 0.8rem;
      line-height: 1.85;
      white-space: pre-wrap;
    }
    .log-ok   { color: #3ecf6e; }
    .log-err  { color: #f56565; }
    .log-info { color: #5b8af5; }
    .log-warn { color: #f5a623; }

    /* ── Download ───────────────────────────────────────────── */
    #download-card { display: none; }
    #download-link {
      display: inline-block;
      background: #1a4a8a;
      color: #eeeef5;
      text-decoration: none;
      padding: 0.55rem 1.3rem;
      border-radius: 7px;
      font-size: 0.875rem;
      font-weight: 500;
      transition: background 0.15s, box-shadow 0.15s;
    }
    #download-link:hover {
      background: #2258b0;
      box-shadow: 0 2px 10px rgba(34, 88, 176, 0.35);
    }
    #rom-info { font-size: 0.78rem; color: #70708a; margin-top: 0.55rem; }

    /* ── Disclosure sections (details / summary) ─────────────── */
    details > summary {
      color: #55556e;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      user-select: none;
      list-style: none;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      margin-top: 0.85rem;
    }
    details > summary::-webkit-details-marker { display: none; }
    details > summary::before {
      content: '▸';
      font-size: 0.65rem;
      transition: transform 0.15s;
    }
    details[open] > summary::before { transform: rotate(90deg); }
    details > summary:hover { color: #8888a8; }
    .details-body { margin-top: 0.7rem; }

    /* Log disclosure: styled to match the h2 header it replaces */
    details.log-section { display: block; }
    details.log-section > summary {
      color: #7878a0;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-top: 0;
      margin-bottom: 0;
    }
    details.log-section > summary::before { display: none; }
    details.log-section > summary::after {
      content: ' ▸';
      font-size: 0.65rem;
      color: #44445a;
    }
    details.log-section[open] > summary::after { content: ' ▾'; }

    /* ── Info panel ─────────────────────────────────────────── */
    .info-panel { display: none; padding: 0; }
    .info-panel.visible { display: block; }

    .info-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }
    .info-table td { padding: 0.38rem 0.65rem; vertical-align: top; }
    .info-table tr + tr td { border-top: 1px solid #1e1e28; }

    .info-sec td {
      color: #7878a0;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding-top: 0.9rem;
      padding-bottom: 0.3rem;
      border-top: none !important;
    }
    .info-sec:first-child td { padding-top: 0.35rem; }

    .info-row td:first-child {
      color: #7070a0;
      width: 38%;
      white-space: nowrap;
    }
    .info-row td:last-child {
      color: #c8c8d4;
      font-family: ui-monospace, 'Cascadia Code', Consolas, monospace;
      font-size: 0.8rem;
      word-break: break-all;
    }
    .info-ok   { color: #3ecf6e !important; }
    .info-err  { color: #f56565 !important; }
    .info-warn { color: #f5a623 !important; }

    .copy-btn {
      background: #22222e;
      color: #70709a;
      border: 1px solid #38384e;
      border-radius: 4px;
      padding: 0.1rem 0.4rem;
      font-size: 0.7rem;
      font-weight: 500;
      cursor: pointer;
      margin-left: 0.6rem;
      vertical-align: middle;
      box-shadow: none;
      transition: background 0.12s, color 0.12s;
      letter-spacing: 0;
    }
    .copy-btn:hover { background: #2e2e40; color: #aaa; box-shadow: none; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "preact":       "./js/lib/preact.module.js",
      "preact/hooks": "./js/lib/hooks.module.js",
      "htm/preact":   "./js/lib/htm-preact.js"
    }
  }
  </script>
</head>
<body>
<div id="root"></div>
<script type="module" src="./js/app.js"></script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js");
  }
</script>
</body>
</html>
