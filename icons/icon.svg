<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#111111"/>
  <!-- Cartridge body -->
  <rect x="80" y="112" width="352" height="272" rx="20" fill="#1a1a1a" stroke="#2a6633" stroke-width="6"/>
  <!-- Cartridge notch (bottom connector area) -->
  <rect x="160" y="336" width="192" height="48" rx="8" fill="#111111"/>
  <!-- Label area -->
  <rect x="96" y="128" width="320" height="176" rx="12" fill="#0d2a0d"/>
  <!-- INL text -->
  <text x="256" y="238"
        font-family="ui-monospace, Consolas, monospace"
        font-size="96"
        font-weight="bold"
        fill="#22aa66"
        text-anchor="middle"
        dominant-baseline="middle">INL</text>
  <!-- Connector pins -->
  <rect x="128" y="356" width="16" height="28" rx="3" fill="#444"/>
  <rect x="160" y="356" width="16" height="28" rx="3" fill="#444"/>
  <rect x="192" y="356" width="16" height="28" rx="3" fill="#444"/>
  <rect x="224" y="356" width="16" height="28" rx="3" fill="#444"/>
  <rect x="256" y="356" width="16" height="28" rx="3" fill="#444"/>
  <rect x="288" y="356" width="16" height="28" rx="3" fill="#444"/>
  <rect x="320" y="356" width="16" height="28" rx="3" fill="#444"/>
  <rect x="352" y="356" width="16" height="28" rx="3" fill="#444"/>
</svg>
