<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="INL Retro icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="cart" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8e08e"/>
      <stop offset="1" stop-color="#f4d35e"/>
    </linearGradient>
  </defs>

  <rect x="48" y="48" width="928" height="928" rx="180" fill="url(#bg)"/>

  <!-- cartridge body -->
  <rect x="176" y="196" width="672" height="632" rx="64" fill="url(#cart)"/>
  <rect x="176" y="196" width="672" height="120" rx="64" fill="#e6c24f"/>
  <rect x="232" y="244" width="560" height="52" rx="26" fill="#d4ad3f"/>

  <!-- screw dots -->
  <circle cx="270" cy="258" r="10" fill="#b8922f"/>
  <circle cx="754" cy="258" r="10" fill="#b8922f"/>

  <!-- chip -->
  <rect x="320" y="380" width="384" height="264" rx="28" fill="#111827"/>
  <rect x="344" y="404" width="336" height="216" rx="18" fill="#0b1020"/>
  <rect x="404" y="444" width="216" height="136" rx="12" fill="#22c55e"/>
  <rect x="428" y="468" width="168" height="88" rx="10" fill="#16a34a"/>

  <!-- chip pins -->
  <g fill="#94a3b8">
    <rect x="296" y="408" width="18" height="36" rx="4"/>
    <rect x="296" y="456" width="18" height="36" rx="4"/>
    <rect x="296" y="504" width="18" height="36" rx="4"/>
    <rect x="296" y="552" width="18" height="36" rx="4"/>
    <rect x="710" y="408" width="18" height="36" rx="4"/>
    <rect x="710" y="456" width="18" height="36" rx="4"/>
    <rect x="710" y="504" width="18" height="36" rx="4"/>
    <rect x="710" y="552" width="18" height="36" rx="4"/>
  </g>

  <!-- bottom pins -->
  <g fill="#cbd5e1">
    <rect x="248" y="816" width="40" height="28" rx="6"/>
    <rect x="312" y="816" width="40" height="28" rx="6"/>
    <rect x="376" y="816" width="40" height="28" rx="6"/>
    <rect x="440" y="816" width="40" height="28" rx="6"/>
    <rect x="504" y="816" width="40" height="28" rx="6"/>
    <rect x="568" y="816" width="40" height="28" rx="6"/>
    <rect x="632" y="816" width="40" height="28" rx="6"/>
    <rect x="696" y="816" width="40" height="28" rx="6"/>
  </g>
</svg>